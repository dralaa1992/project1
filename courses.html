     <style>
      /* استدعاء خط رائع من جوجل */
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&display=swap');

/* القائمة الرئيسية */
#navigation {
    list-style: none;
    margin: 0 auto;                 
    padding: 0;
    display: flex;
    justify-content: center;        /* وسط أفقي */
    gap: 50px;                      /* مسافة واضحة بين الأزرار */
    align-items: center;
}

/* كل زر */
#navigation li {
    position: relative;
}

#navigation li a {
    display: inline-flex;           /* عشان يبقى أفقي دايمًا */
    align-items: center;
    justify-content: center;
    padding: 14px 1px;             /* حجم أكبر للزر */
    color: #fff;                    
    font-size: 17px;                
    font-weight: 900;               
    font-family: 'Cairo', sans-serif; 
    text-decoration: none;
    letter-spacing: 1px;            
    white-space: nowrap;            /* يمنع النزول لسطر جديد */
    transition: all 0.3s ease-in-out;
    border-radius: 8px;
}

/* عند المرور */
#navigation li a:hover {
    color: #FFD700;                 
    transform: scale(1.08);         
}

/* الصورة المنسدلة */
.nav-image {
    position: absolute;
    top: 115%;                      
    left: 50%;
    transform: translateX(-50%);
    display: none;
    padding: 10px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

.nav-image img {
    width: 140px;                   
    height: auto;
    border-radius: 8px;
}

/* إظهار الصورة عند المرور */
#navigation li:hover .nav-image {
    display: block;
    opacity: 1;
    transform: translate(-50%, 0);
}

/* حركة لطيفة عند الاختفاء */
#navigation li:not(:hover) .nav-image {
    opacity: 0;
    transform: translate(-50%, 12px);
}
.slider_info h3 {
    font-size: 17px;         /* الحجم الجديد أصغر من الافتراضي */
    line-height: 1.8;        /* مسافة مريحة بين الأسطر */
    font-weight: 600;        /* وزن خط متوسط */
    color: #fff;             /* لون أبيض (أو غيره حسب الخلفية) */
    text-align: right;       /* محاذاة للنص العربي */
}
@media (max-width: 992px) {
    .slider_info h3 {
        font-size: 18px;   /* على التابلت */
    }
}
@media (max-width: 576px) {
    .slider_info h3 {
        font-size: 16px;   /* على الموبايل */
    }
}

   <script>
  function checkPassword(link, correctPassword) {
    const userInput = prompt("من فضلك أدخل كلمة المرور");
    if (userInput === correctPassword) {
      window.location.href = link;
    } else {
      alert("كلمة المرور غير صحيحة!");
    }
  }

  document.querySelectorAll(".module-card").forEach(card => {
  card.addEventListener("click", () => {
    if (card.classList.contains("unlocked")) {
      window.location.href = card.dataset.url;
      return;
    }

    let pass = prompt("من فضلك أدخل كلمة المرور:");
    if (pass === card.dataset.pass) {
      alert("تم الفتح بنجاح ✅");
      card.classList.remove("locked");
      card.classList.add("unlocked");
      card.querySelector(".lock-icon").style.display = "none";
    } else {
      alert("كلمة المرور غير صحيحة ❌");
    }
  });
});

</script>
